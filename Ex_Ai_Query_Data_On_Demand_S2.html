<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .shell { background: #111; border: 1px solid #222; font-family: var(--font-sans); }
  .topbar { background: #181818; border-bottom: 1px solid #222; padding: 8px 14px; display: flex; align-items: center; justify-content: space-between; }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #2e2e2e; display: inline-block; }
  .topbar-title { font-size: 11px; color: #555; letter-spacing: 0.06em; }
  .topbar-badge { font-size: 9px; color: #d07010; background: #1a1000; border: 1px solid #2e1c00; padding: 3px 8px; letter-spacing: 0.06em; }
  .q-selector { padding: 12px 16px; border-bottom: 1px solid #1e1e1e; display: flex; gap: 6px; flex-wrap: wrap; }
  .q-chip { font-size: 10px; color: #555; background: #161616; border: 1px solid #2a2a2a; padding: 5px 10px; cursor: pointer; letter-spacing: 0.02em; transition: all 0.15s; }
  .q-chip:hover { border-color: #d07010; color: #c8c8c8; }
  .q-chip.active { border-color: #d07010; color: #d07010; background: #1a1000; }
  .chat-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; min-height: 280px; }
  .msg-row { display: flex; gap: 10px; align-items: flex-start; }
  .msg-row.user { flex-direction: row-reverse; }
  .avatar { width: 26px; height: 26px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; letter-spacing: 0.05em; font-weight: 500; }
  .avatar.ai { background: #1a1a1a; border: 1px solid #2a2a2a; color: #555; }
  .avatar.user { background: #1a1000; border: 1px solid #2e1c00; color: #d07010; }
  .bubble { max-width: 80%; padding: 10px 13px; font-size: 12px; line-height: 1.6; }
  .bubble.user { background: #161206; border: 1px solid #2a1c00; color: #c8c8c8; }
  .bubble.ai { background: #161616; border: 1px solid #222; color: #aaa; }
  .qlabel { font-size: 9px; color: #d07010; letter-spacing: 0.08em; margin-bottom: 5px; }
  .alabel { font-size: 9px; color: #444; letter-spacing: 0.08em; margin-bottom: 5px; }
  .hi { color: #c8c8c8; font-weight: 500; }
  .higreen { color: #4a9a5a; font-weight: 500; }
  .chart-inline { margin-top: 12px; padding-top: 12px; border-top: 1px solid #1e1e1e; }
  .chart-inline-label { font-size: 9px; color: #444; letter-spacing: 0.08em; margin-bottom: 8px; }
  .mini-bars { display: flex; flex-direction: column; gap: 5px; }
  .mini-row { display: flex; align-items: center; gap: 7px; }
  .mini-ch { font-size: 10px; color: #666; font-family: 'Courier New', monospace; width: 82px; text-align: right; flex-shrink: 0; }
  .mini-track { flex: 1; height: 10px; background: #1a1a1a; }
  .mini-fill { height: 100%; }
  .mini-val { font-size: 10px; color: #555; font-family: 'Courier New', monospace; width: 52px; flex-shrink: 0; }
  .input-row { padding: 10px 14px; border-top: 1px solid #1e1e1e; display: flex; gap: 8px; align-items: center; }
  .fake-input { flex: 1; background: #161616; border: 1px solid #222; padding: 7px 10px; font-size: 11px; color: #444; font-family: 'Courier New', monospace; }
  .send-btn { font-size: 9px; color: #d07010; background: #1a1000; border: 1px solid #2e1c00; padding: 6px 12px; letter-spacing: 0.06em; white-space: nowrap; }
  .typing { display: flex; gap: 3px; align-items: center; padding: 10px 13px; background: #161616; border: 1px solid #222; }
  .typing span { width: 5px; height: 5px; background: #333; border-radius: 50%; animation: blink 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { background:#333; } 40% { background:#888; } }
</style>

<div class="shell">
  <div class="topbar">
    <div class="topbar-left">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      <span class="topbar-title">marketing_dataset_3yr · AI QUERY INTERFACE</span>
    </div>
    <span class="topbar-badge">DATASET LOADED</span>
  </div>

  <div class="q-selector">
    <div class="q-chip active" onclick="selectQ(0,this)">Which channel drives the most revenue?</div>
    <div class="q-chip" onclick="selectQ(1,this)">What changed from 2024 to 2025?</div>
    <div class="q-chip" onclick="selectQ(2,this)">Where should we shift budget?</div>
  </div>

  <div class="chat-body" id="chatBody"></div>

  <div class="input-row">
    <div class="fake-input" id="inputPreview">Which channel is driving the most revenue and why?</div>
    <div class="send-btn">SEND</div>
  </div>
</div>

<script>
const questions = [
  "Which channel is driving the most revenue and why?",
  "What changed from 2024 to 2025?",
  "Where should we shift budget to improve performance?"
];

const answers = [
  {
    text: `<span class="higreen">Referral</span> is the top channel at <span class="higreen">$1.75M</span> in 2025, on just <span class="hi">550 leads</span>. It converts at <span class="hi">42% lead-to-opp</span> and <span class="hi">63% close rate</span>, both the highest of any channel. Paid Search produced <span class="higreen">$776K</span> from nearly 3x the lead volume.`,
    chartType: 'revenue'
  },
  {
    text: `Total revenue grew from <span class="higreen">$5.17M</span> to <span class="higreen">$6.27M</span>, up <span class="hi">21%</span>. Biggest gains: <span class="hi">Referral +$372K</span>, <span class="hi">Email +$264K</span>, <span class="hi">Influencer +$224K</span>. Partnerships launched in 2025 and added <span class="higreen">$360K</span> immediately.`,
    chartType: 'yoy'
  },
  {
    text: `<span class="higreen">Referral</span> and <span class="higreen">Email</span> produce the most revenue per lead. Paid Search and Paid Social have the weakest close rates relative to spend. Moving 20 to 30% of paid budget toward Referral and Email would increase closed revenue at no additional cost. <span class="hi">Partnerships</span> is worth scaling at 50% close rate.`,
    chartType: 'efficiency'
  }
];

const chartData = {
  revenue: {
    label: 'REVENUE BY CHANNEL · 2025',
    channels: ['Referral','Email','Paid Search','Direct','Paid Social','Influencer','Affiliates','Partnerships','Organic'],
    values:   [1752000,1140000,776000,568000,504000,432000,432000,360000,304000],
    fmt: v => '$' + (v/1000).toFixed(0) + 'K'
  },
  yoy: {
    label: 'REVENUE CHANGE · 2024 vs 2025',
    channels: ['Referral','Partnerships','Email','Influencer','Affiliates','Direct','Paid Search','Paid Social','Organic'],
    values:   [372000,360000,264000,224000,224000,136000,152000,104000,56000],
    fmt: v => '+$' + (v/1000).toFixed(0) + 'K'
  },
  efficiency: {
    label: 'CLOSE RATE BY CHANNEL · 2025',
    channels: ['Referral','Partnerships','Email','Affiliates','Influencer','Direct','Paid Search','Paid Social','Organic'],
    values:   [63,50,50,48,45,38,36,31,25],
    fmt: v => v + '%'
  }
};

function renderChart(type) {
  const d = chartData[type];
  const max = Math.max(...d.values);
  let html = `<div class="chart-inline"><div class="chart-inline-label">${d.label}</div><div class="mini-bars">`;
  d.channels.forEach((ch, i) => {
    const pct = Math.round((d.values[i] / max) * 100);
    const col = i === 0 ? '#e8a040' : i === 1 ? '#c07030' : '#2e2e2e';
    html += `<div class="mini-row"><span class="mini-ch">${ch}</span><div class="mini-track"><div class="mini-fill" style="width:${pct}%;background:${col};"></div></div><span class="mini-val">${d.fmt(d.values[i])}</span></div>`;
  });
  html += '</div></div>';
  return html;
}

function buildChat(idx) {
  return `
    <div class="msg-row user">
      <div class="avatar user">YOU</div>
      <div class="bubble user"><div class="qlabel">QUESTION</div>${questions[idx]}</div>
    </div>
    <div class="msg-row">
      <div class="avatar ai">AI</div>
      <div class="bubble ai">
        <div class="alabel">AI ANALYSIS · DATASET REFERENCE</div>
        <div>${answers[idx].text}</div>
        ${renderChart(answers[idx].chartType)}
      </div>
    </div>`;
}

let current = 0;

function selectQ(idx, btn) {
  if (idx === current) return;
  current = idx;
  document.querySelectorAll('.q-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('inputPreview').textContent = questions[idx];
  const body = document.getElementById('chatBody');
  body.innerHTML = `
    <div class="msg-row user">
      <div class="avatar user">YOU</div>
      <div class="bubble user"><div class="qlabel">QUESTION</div>${questions[idx]}</div>
    </div>
    <div class="msg-row">
      <div class="avatar ai">AI</div>
      <div class="typing"><span></span><span></span><span></span></div>
    </div>`;
  setTimeout(() => { body.innerHTML = buildChat(idx); }, 800);
}

document.getElementById('chatBody').innerHTML = buildChat(0);
</script>
